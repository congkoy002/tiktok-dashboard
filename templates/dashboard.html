<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>TradingView AI Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{background:#0f172a;color:white;font-family:Arial}
table{width:100%;margin-top:20px;border-collapse:collapse}
td,th{padding:10px;text-align:center}

.row{transition:.3s;cursor:pointer}

.up{background:rgba(34,197,94,0.2)}
.down{background:rgba(239,68,68,0.2)}
.neutral{background:rgba(148,163,184,0.1)}
</style>
</head>

<body>

<h2>🚀 TradingView AI Dashboard</h2>

<canvas id="chart"></canvas>

<table>
<thead>
<tr>
<th>User</th><th>Followers</th><th>Views</th><th>Score</th><th>Status</th>
</tr>
</thead>
<tbody id="tb"></tbody>
</table>

<script>

let lastRank={}
let chart;

function safe(v){return v??0}

async function load(){

let res=await fetch("/api/data")
let data=await res.json()

data.sort((a,b)=>b.Score-a.Score)

let tb=document.getElementById("tb")
tb.innerHTML=""

data.forEach((d,i)=>{

let prev=lastRank[d.Username]
let cls="neutral"

if(prev!==undefined){
if(i<prev) cls="up"
else if(i>prev) cls="down"
}

lastRank[d.Username]=i

tb.innerHTML+=`
<tr class="row ${cls}" onclick="openChart('${d.Username}')">
<td>#${i+1} ${d.Username}</td>
<td>${safe(d.Followers)}</td>
<td>${safe(d.TotalViews)}</td>
<td>${safe(d.Score)}</td>
<td>${d.Status}</td>
</tr>`
})

}

async function openChart(u){

let res=await fetch("/api/history")
let data=await res.json()

let f=data.filter(x=>x[0]==u)

let labels=f.map(x=>x[16])
let views=f.map(x=>parseInt(x[5])||0)

if(chart) chart.destroy()

chart=new Chart(document.getElementById("chart"),{
type:"line",
data:{
labels,
datasets:[{
label:u,
data:views,
borderColor:"#22c55e"
}]
}
})

}

load()
setInterval(load,5000)

</script>

</body>
</html>
