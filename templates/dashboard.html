<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>TikTok AI Dashboard PRO</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0b1220;
    color: white;
}

/* ===== TOP BAR ===== */
.header {
    padding: 20px;
    text-align: center;
    font-size: 22px;
    font-weight: bold;
}

/* ===== STATS ===== */
.stats {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 15px;
    padding: 20px;
}

.card {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 12px;
    padding: 15px;
    backdrop-filter: blur(10px);
}

.card h3 {
    margin: 0;
    font-size: 14px;
    color: #94a3b8;
}

.card p {
    font-size: 20px;
    margin: 8px 0 0 0;
}

/* ===== SEARCH ===== */
.searchBox {
    padding: 0 20px;
}

input {
    width: 100%;
    padding: 10px;
    border-radius: 8px;
    border: none;
    outline: none;
    background: #111827;
    color: white;
}

/* ===== TABLE ===== */
.tableWrap {
    padding: 20px;
}

table {
    width: 100%;
    border-collapse: collapse;
    background: rgba(255,255,255,0.03);
    border-radius: 12px;
    overflow: hidden;
}

th, td {
    padding: 12px;
    text-align: center;
}

th {
    background: #111827;
    color: #94a3b8;
}

tr:hover {
    background: rgba(255,255,255,0.05);
}

.best {
    background: rgba(34,197,94,0.15) !important;
}

/* ===== BADGES ===== */
.badge {
    padding: 4px 8px;
    border-radius: 6px;
    font-size: 12px;
}

.viral { background:#16a34a; }
.flop { background:#dc2626; }
.normal { background:#f59e0b; }

/* ===== GRID ===== */
.grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    padding: 20px;
}
</style>
</head>

<body>

<div class="header">🚀 TikTok AI Dashboard PRO</div>

<!-- ===== STATS ===== -->
<div class="stats">
    <div class="card">
        <h3>Total Channels</h3>
        <p id="total">0</p>
    </div>
    <div class="card">
        <h3>Total Views</h3>
        <p id="views">0</p>
    </div>
    <div class="card">
        <h3>Best Growth</h3>
        <p id="growth">0</p>
    </div>
    <div class="card">
        <h3>Viral Count</h3>
        <p id="viral">0</p>
    </div>
</div>

<!-- ===== SEARCH ===== -->
<div class="searchBox">
    <input id="search" placeholder="Search username..." oninput="renderTable()" />
</div>

<!-- ===== CHART ===== -->
<div class="grid">
    <div class="card">
        <canvas id="chart"></canvas>
    </div>

    <div class="card">
        <h3>🔥 BEST CHANNEL</h3>
        <div id="bestBox">Loading...</div>
    </div>
</div>

<!-- ===== TABLE ===== -->
<div class="tableWrap">
<table>
<thead>
<tr>
<th>User</th>
<th>Followers</th>
<th>Views</th>
<th>Growth</th>
<th>Last</th>
<th>Status</th>
</tr>
</thead>
<tbody id="tbody"></tbody>
</table>
</div>

<script>

let DATA = [];
let chart;

async function fetchData(){
    let res = await fetch('/api/data');
    DATA = await res.json();

    updateStats();
    renderTable();
    renderChart();
    renderBest();
}

function updateStats(){
    document.getElementById("total").innerText = DATA.length;

    let totalViews = DATA.reduce((s,d)=>s+(d.TotalViews||0),0);
    document.getElementById("views").innerText = totalViews;

    let bestGrowth = Math.max(...DATA.map(d=>d.ViewGrowth||0));
    document.getElementById("growth").innerText = bestGrowth;

    let viral = DATA.filter(d=>d.Viral=="YES").length;
    document.getElementById("viral").innerText = viral;
}

function renderTable(){
    let search = document.getElementById("search").value.toLowerCase();

    let tbody = document.getElementById("tbody");
    tbody.innerHTML = "";

    let sorted = [...DATA].sort((a,b)=> (b.TotalViews||0)-(a.TotalViews||0));

    sorted.forEach(d=>{
        if(search && !d.Username.toLowerCase().includes(search)) return;

        let status = d.Viral=="YES" ? "viral" :
                     d.Flop=="YES" ? "flop" : "normal";

        tbody.innerHTML += `
        <tr class="${sorted[0].Username==d.Username ? 'best':''}">
            <td>${d.Username}</td>
            <td>${d.Followers}</td>
            <td>${d.TotalViews}</td>
            <td style="color:#38bdf8">${d.ViewGrowth||0}</td>
            <td>${d.LastView}</td>
            <td><span class="badge ${status}">${status.toUpperCase()}</span></td>
        </tr>`;
    });
}

function renderChart(){
    let labels = DATA.map(d=>d.Username);
    let views = DATA.map(d=>d.TotalViews||0);

    if(chart) chart.destroy();

    chart = new Chart(document.getElementById("chart"), {
        type:"bar",
        data:{
            labels:labels,
            datasets:[{
                label:"Views",
                data:views,
                backgroundColor:"#38bdf8"
            }]
        }
    });
}

function renderBest(){
    if(!DATA.length) return;

    let best = [...DATA].sort((a,b)=>(b.ViewGrowth||0)-(a.ViewGrowth||0))[0];

    document.getElementById("bestBox").innerHTML = `
        <h2>${best.Username}</h2>
        <p>Views: ${best.TotalViews}</p>
        <p>Growth: +${best.ViewGrowth||0}</p>
    `;
}

setInterval(fetchData, 30000);
fetchData();

</script>

</body>
</html>
