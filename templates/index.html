<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>🚀 TikTok Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{background:#0f172a;color:#fff;font-family:Arial;padding:20px}
.card{background:#1e293b;padding:15px;border-radius:10px;margin-bottom:20px}
table{width:100%;border-collapse:collapse}
td,th{padding:10px;border-bottom:1px solid #333;text-align:center}
tr:hover{background:#334155}
</style>
</head>

<body>

<h1>🚀 TikTok Dashboard</h1>

<div class="card">
  <div>🏆 Best: <span id="bestChannel"></span></div>
  <div>📊 Total: <span id="totalChannels"></span></div>
  <div>🔥 Viral: <span id="viralCount"></span></div>
</div>

<!-- 🆕 SEARCH -->
<div class="card">
  🔍 <input id="searchInput" placeholder="Search username..." style="padding:8px;width:250px">
</div>

<!-- 🆕 TOP -->
<div class="card">
  🔥 Top 10 Growing:
  <ul id="topList"></ul>
</div>

<div class="card">
  <canvas id="mainChart"></canvas>
</div>

<div class="card">
<table>
<thead>
<tr>
<th>User</th>
<th>Followers</th>
<th>Likes</th>
<th>Views</th>
<th>Growth</th>
<th>Score</th>
<th>Status</th>
</tr>
</thead>
<tbody id="tableBody"></tbody>
</table>
</div>

<!-- MODAL -->
<div id="userModal" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.8)">
<div style="width:80%;margin:50px auto;background:#1e293b;padding:20px;border-radius:10px">
<h2 id="modalTitle"></h2>
<canvas id="userChart"></canvas>
<button onclick="closeModal()">Close</button>
</div>
</div>

<script src="/static/script.js"></script>

</body>
</html>
