<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>TikTok AI Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0b1220;
    color: white;
}

/* HEADER */
.header {
    padding: 20px;
    background: #111827;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.title {
    font-size: 20px;
    font-weight: bold;
}

/* GRID */
.container {
    padding: 20px;
    display: grid;
    grid-template-columns: 1fr 2fr;
    gap: 20px;
}

/* LEFT PANEL */
.card {
    background: #1f2937;
    padding: 15px;
    border-radius: 12px;
    margin-bottom: 15px;
}

/* TABLE */
table {
    width: 100%;
    border-collapse: collapse;
    background: #111827;
    border-radius: 10px;
    overflow: hidden;
}

th, td {
    padding: 10px;
    text-align: center;
    border-bottom: 1px solid #222;
}

th {
    background: #1f2937;
    cursor: pointer;
}

tr:hover {
    background: #1e293b;
    cursor: pointer;
}

/* HIGHLIGHT */
.viral {
    color: #22c55e;
    font-weight: bold;
}

.flop {
    color: #ef4444;
    font-weight: bold;
}

.growing {
    color: #38bdf8;
}

/* CHART */
.chartBox {
    background: #111827;
    padding: 15px;
    border-radius: 12px;
}

/* BEST */
.best {
    font-size: 16px;
    color: #facc15;
}

</style>
</head>

<body>

<div class="header">
    <div class="title">🚀 TikTok AI Dashboard</div>
    <div id="status">Live</div>
</div>

<div class="container">

    <!-- LEFT -->
    <div>

        <div class="card">
            <h3>🏆 Best Channel</h3>
            <div id="bestBox">Loading...</div>
        </div>

        <div class="card">
            <h3>📊 Selected User</h3>
            <div id="userBox">Click a username</div>
        </div>

    </div>

    <!-- RIGHT -->
    <div>

        <div class="chartBox">
            <canvas id="chart"></canvas>
        </div>

        <br>

        <table>
            <thead>
                <tr>
                    <th>Username</th>
                    <th>Followers</th>
                    <th>Views</th>
                    <th>Last</th>
                    <th>Score</th>
                    <th>Status</th>
                </tr>
            </thead>
            <tbody id="tbody"></tbody>
        </table>

    </div>

</div>

<script>

let chart;

async function loadBest(){
    let res = await fetch('/api/data');
    let data = await res.json();

    if(!data.length) return;

    let best = data.reduce((a,b)=> (a.Score>b.Score?a:b));

    document.getElementById("bestBox").innerHTML = `
        <div class="best">${best.Username}</div>
        <div>Score: ${best.Score}</div>
        <div>Views: ${best.TotalViews}</div>
        <div class="growing">${best.Status}</div>
    `;
}

async function loadTable(){
    let res = await fetch('/api/data');
    let data = await res.json();

    let tbody = document.getElementById("tbody");
    tbody.innerHTML = "";

    data.forEach(d=>{
        let statusClass =
            d.Viral === "YES" ? "viral" :
            d.Flop === "YES" ? "flop" :
            "growing";

        tbody.innerHTML += `
        <tr onclick='selectUser("${d.Username}")'>
            <td>${d.Username}</td>
            <td>${d.Followers}</td>
            <td>${d.TotalViews}</td>
            <td>${d.LastView}</td>
            <td>${d.Score}</td>
            <td class="${statusClass}">
                ${d.Viral==="YES"?"🔥 VIRAL":
                  d.Flop==="YES"?"❌ FLOP":"⚖️ GROW"}
            </td>
        </tr>`;
    });
}

async function selectUser(username){

    let res = await fetch('/api/history');
    let data = await res.json();

    let userData = data.filter(r=>r[0]===username);

    let views = userData.map(r=>parseInt(r[5]||0));

    document.getElementById("userBox").innerHTML =
        `<b>${username}</b><br>Points: ${views.length}`;

    if(chart) chart.destroy();

    chart = new Chart(document.getElementById("chart"),{
        type:'line',
        data:{
            labels: userData.map((_,i)=>i),
            datasets:[{
                label:'Views',
                data: views,
                borderColor:'#38bdf8'
            }]
        }
    });
}

async function init(){
    await loadBest();
    await loadTable();
}

init();

setInterval(init,60000);

</script>

</body>
</html>
