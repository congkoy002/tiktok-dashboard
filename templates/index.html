<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>TikTok AI Dashboard PRO</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
    background:#0b1220;
    color:#fff;
    font-family:Arial;
    padding:20px;
}

h1{
    text-align:center;
}

.container{
    display:grid;
    grid-template-columns:1fr 2fr;
    gap:15px;
}

/* ================= CARD ================= */
.card{
    background:rgba(255,255,255,0.05);
    padding:15px;
    border-radius:12px;
}

/* ================= TABLE ================= */
table{
    width:100%;
    border-collapse:collapse;
}

th,td{
    padding:10px;
    text-align:center;
}

th{
    background:#1e293b;
}

tr{
    transition:all .3s ease;
}

tr:hover{
    background:rgba(255,255,255,0.08);
}

/* ================= HIGHLIGHT ================= */
.hot{
    background:rgba(34,197,94,0.15);
    border-left:3px solid #22c55e;
}

.rising{
    background:rgba(59,130,246,0.15);
    border-left:3px solid #3b82f6;
}

/* ================= TOP BOX ================= */
#topBox{
    font-size:14px;
    line-height:1.6;
}

/* ================= CHART ================= */
canvas{
    width:100%;
}

/* ================= HEATMAP ================= */
#heatmap{
    display:grid;
    grid-template-columns:repeat(7,1fr);
    gap:4px;
    margin-top:10px;
}

.cell{
    height:18px;
    border-radius:3px;
}

/* ================= ANIMATION ================= */
@keyframes glow {
    0% { transform:scale(1); }
    50% { transform:scale(1.02); }
    100% { transform:scale(1); }
}

.animated{
    animation:glow 1s infinite;
}
</style>
</head>

<body>

<h1>🚀 TikTok AI Dashboard PRO</h1>

<div class="container">

<!-- LEFT -->
<div>

<div class="card">
<h3>🔥 Top Trending</h3>
<div id="topBox"></div>
</div>

<div class="card">
<h3>📊 Heatmap Growth</h3>
<div id="heatmap"></div>
</div>

</div>

<!-- RIGHT -->
<div>

<div class="card">
<canvas id="chart"></canvas>
</div>

<div class="card">
<table>
<thead>
<tr>
<th>User</th>
<th>Followers</th>
<th>Views</th>
<th>Growth</th>
<th>AI Score</th>
</tr>
</thead>
<tbody id="tbody"></tbody>
</table>
</div>

</div>
</div>

<script>

let DATA=[];

// ================= SAFE =================
function safe(v){
    return v ?? 0;
}

// ================= AI SCORE =================
function calcScore(d){

    let f = d.Followers || 1;
    let v = d.TotalViews || 0;
    let g = d.ViewGrowth || 0;
    let l = d.LastVideoView || 0;

    let score =
        Math.min(g/50,40) +
        Math.min((l/f)*100,30) +
        Math.min(Math.log10(v+1)*5,20) +
        (l > f*0.2 ? 10 : 0);

    return Math.round(score);
}

// ================= LOAD DATA =================
async function load(){

    let res = await fetch("/api/workspace/default/data");
    DATA = await res.json();

    DATA = DATA.map(d => ({
        ...d,
        AI: calcScore(d)
    }));

    render();
}

// ================= RENDER =================
function render(){
    renderTable();
    renderTop();
    renderHeatmap();
}

// ================= TABLE =================
function renderTable(){

    let tbody = document.getElementById("tbody");
    tbody.innerHTML = "";

    let sorted = [...DATA].sort((a,b)=>b.AI - a.AI);

    sorted.forEach(d => {

        let hot = d.AI > 75;
        let rising = d.ViewGrowth > 1000;

        tbody.innerHTML += `
        <tr class="${hot ? 'hot' : ''} ${rising ? 'rising' : ''}">
            <td onclick="openChart('${d.Username}')" style="cursor:pointer">
                ${d.Username}
            </td>
            <td>${safe(d.Followers)}</td>
            <td>${safe(d.TotalViews)}</td>
            <td>${safe(d.ViewGrowth)}</td>
            <td>${d.AI}</td>
        </tr>
        `;
    });
}

// ================= TOP TREND =================
function renderTop(){

    let top = [...DATA]
        .sort((a,b)=>b.AI - a.AI)
        .slice(0,5);

    document.getElementById("topBox").innerHTML =
        top.map(d =>
            `🔥 <b>${d.Username}</b> - Score: ${d.AI} - Views: ${d.TotalViews}`
        ).join("<br>");
}

// ================= HEATMAP =================
function renderHeatmap(){

    let el = document.getElementById("heatmap");
    el.innerHTML = "";

    DATA.slice(0,7).forEach(d => {

        let intensity = Math.min(d.ViewGrowth / 3000, 1);

        el.innerHTML += `
        <div class="cell"
        style="background:rgba(34,197,94,${intensity})"></div>
        `;
    });
}

// ================= CHART =================
async function openChart(user){

    let res = await fetch("/api/history");
    let history = await res.json();

    let filtered = history.filter(x => x[1] == user);

    let labels = filtered.map(x => x[0]);
    let views = filtered.map(x => parseInt(x[5]) || 0);

    new Chart(document.getElementById("chart"), {
        type: "line",
        data: {
            labels,
            datasets: [{
                label: user,
                data: views,
                borderColor: "#22c55e",
                tension: 0.3
            }]
        }
    });
}

// ================= AUTO REFRESH =================
load();
setInterval(load, 30000);

</script>

</body>
</html>
